<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic tac toe</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    .container{
      text-align: center;
    }

    h1{
      margin-bottom: 20px;
      font-size: 40px;
    }

    #status{
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .board{
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .cell{
      width: 100px;
      height: 100px;
      border: 3px solid #6c7a89;
      background: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    .cell:hover{
      background: #ececec;
    }

    .reset-btn{
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      border: 2px solid gray;
      background: white;
      border-radius: 5px;
    }

    .reset-btn:hover{
      background: #e5e5e5;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Tic Tac Toe</h1>

    <div id="status">Player X Turn</div>

    <div class="board">

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

    </div>

    <button class="reset-btn" onclick="resetGame()">
      Reset Game
    </button>

  </div>

  <script>

    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");

    let currentPlayer = "X";
    let gameActive = true;

    const winningPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    cells.forEach((cell, index) => {

      cell.addEventListener("click", function(){

        if(cell.innerText !== "" || !gameActive){
          return;
        }

        cell.innerText = currentPlayer;

        if(checkWinner()){

          statusText.innerText = "Player " + currentPlayer + " Wins!";
          gameActive = false;
          return;
        }

        if(checkDraw()){

          statusText.innerText = "Match Draw!";
          gameActive = false;
          return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";

        statusText.innerText = "Player " + currentPlayer + " Turn";

      });

    });

    function checkWinner(){

      return winningPatterns.some(pattern => {

        return pattern.every(index => {

          return cells[index].innerText === currentPlayer;

        });

      });

    }

    function checkDraw(){

      return [...cells].every(cell => cell.innerText !== "");

    }

    function resetGame(){

      cells.forEach(cell => {

        cell.innerText = "";

      });

      currentPlayer = "X";
      gameActive = true;

      statusText.innerText = "Player X Turn";

    }

  </script>

</body>
</html>
