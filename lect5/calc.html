<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .calculator{
      background:#222;
      padding:20px;
      border-radius:15px;
    }

    input{
      width:100%;
      height:60px;
      margin-bottom:15px;
      border:none;
      outline:none;
      border-radius:10px;
      font-size:28px;
      text-align:right;
      padding:10px;
      background:#333;
      color:#fff;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,70px);
      gap:10px;
    }

    button{
      height:60px;
      border:none;
      border-radius:10px;
      font-size:22px;
      cursor:pointer;
      background:#444;
      color:white;
    }

    button:hover{
      background:#666;
    }

    .operator{
      background:orange;
    }

    .equal{
      background:green;
      grid-column:span 2;
    }

    .clear{
      background:red;
    }
  </style>
</head>
<body>

  <div class="calculator">

    <!-- Sirf ek input field -->
    <input type="text" placeholder="0">

    <!-- Saare buttons -->
    <div class="buttons">
      <button class="clear">C</button>
      <button>%</button>
      <button>/</button>
      <button class="operator">*</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">-</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">+</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>.</button>

      <button>0</button>
      <button class="equal">=</button>
    </div>

  </div>

</body>
</html>
